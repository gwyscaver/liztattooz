<svg viewBox="0 0 160 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- American Traditional Sitting Cat + Crescent Moon -->
  <!-- Bold outlines, clean symmetry, witchy feminine energy -->

  <!-- Crescent Moon — behind cat -->
  <path d="M110 55 C120 30, 135 15, 140 10 C125 18, 112 35, 108 55 C104 75, 112 95, 128 108 C135 114, 140 115, 145 115 C130 120, 110 110, 100 90 C92 72, 95 60, 110 55 Z"
        stroke="#6B7F56" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Tail — wraps around from behind, bold curve -->
  <path d="M45 155 C30 145, 20 125, 22 108 C23 95, 30 88, 38 92"
        stroke="#6B7F56" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Body — sitting upright, slightly curved, bold -->
  <path d="M58 160 C55 155, 48 135, 48 120 C48 105, 52 95, 60 88 C65 84, 72 82, 80 82 C88 82, 95 84, 100 88 C108 95, 112 105, 112 120 C112 135, 105 155, 102 160"
        stroke="#6B7F56" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chest detail line -->
  <path d="M72 110 C76 118, 84 118, 88 110"
        stroke="#6B7F56" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Head — round, bold -->
  <path d="M55 82 C55 68, 62 56, 80 56 C98 56, 105 68, 105 82"
        stroke="#6B7F56" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Ears — pointed, traditional style with inner detail -->
  <path d="M58 70 L48 42 L68 62" stroke="#6B7F56" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M55 62 L52 52 L62 62" stroke="#6B7F56" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <path d="M102 70 L112 42 L92 62" stroke="#6B7F56" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M105 62 L108 52 L98 62" stroke="#6B7F56" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Eyes — bold almond, American Traditional style -->
  <path d="M65 74 C67 70, 73 70, 75 74 C73 77, 67 77, 65 74 Z"
        stroke="#6B7F56" stroke-width="2.5" fill="#6B7F56"/>
  <circle cx="70" cy="73.5" r="1.5" fill="#0D1612"/>

  <path d="M85 74 C87 70, 93 70, 95 74 C93 77, 87 77, 85 74 Z"
        stroke="#6B7F56" stroke-width="2.5" fill="#6B7F56"/>
  <circle cx="90" cy="73.5" r="1.5" fill="#0D1612"/>

  <!-- Nose — small triangle, bold -->
  <path d="M77 79 L80 82 L83 79 Z" fill="#6B7F56"/>

  <!-- Mouth -->
  <path d="M80 82 L80 85" stroke="#6B7F56" stroke-width="2" stroke-linecap="round"/>
  <path d="M76 86 C78 88, 82 88, 84 86" stroke="#6B7F56" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Whiskers — bold, symmetrical -->
  <line x1="68" y1="81" x2="42" y2="76" stroke="#6B7F56" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="84" x2="40" y2="84" stroke="#6B7F56" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="87" x2="42" y2="92" stroke="#6B7F56" stroke-width="2" stroke-linecap="round"/>

  <line x1="92" y1="81" x2="118" y2="76" stroke="#6B7F56" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="84" x2="120" y2="84" stroke="#6B7F56" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="87" x2="118" y2="92" stroke="#6B7F56" stroke-width="2" stroke-linecap="round"/>

  <!-- Front paws — neat, traditional -->
  <path d="M65 155 C62 158, 58 162, 58 166 L72 166 C72 162, 70 158, 68 155"
        stroke="#6B7F56" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M92 155 C90 158, 88 162, 88 166 L102 166 C102 162, 98 158, 95 155"
        stroke="#6B7F56" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Small stars — traditional tattoo accent -->
  <path d="M30 60 L32 54 L34 60 L40 62 L34 64 L32 70 L30 64 L24 62 Z" fill="#6B7F56" opacity="0.5"/>
  <circle cx="135" cy="85" r="2" fill="#6B7F56" opacity="0.4"/>
  <circle cx="25" cy="95" r="1.5" fill="#6B7F56" opacity="0.35"/>
</svg>